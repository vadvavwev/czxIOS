name: Build iOS IPA

  on:
    workflow_dispatch:

  jobs:
    build:
      runs-on: macos-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Show repo structure
          run: |
            pwd
            ls -la

        - name: Show files in swiftui folder
          run: |
            cd Desktop/IOS封装/swiftui
            pwd
            ls -la

        - name: Install XcodeGen
          run: brew install xcodegen

        - name: Generate Xcode project
          run: |
            cd Desktop/IOS封装/swiftui
            xcodegen generate

        - name: Build archive
          run: |
            cd Desktop/IOS封装/swiftui
            xcodebuild archive -project EnterpriseApp.xcodeproj -scheme EnterpriseApp -archivePath build.xcarchive

        - name: Export IPA
          run: |
            cd Desktop/IOS封装/swiftui
            xcodebuild -exportArchive -archivePath build.xcarchive -exportPath . -exportOptionsPlist ExportOptions.plist

        - name: Upload IPA
          uses: actions/upload-artifact@v4
          with:
            name: EnterpriseApp
            path: "Desktop/IOS封装/swiftui/*.ipa"
