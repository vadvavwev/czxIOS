name: Build iOS IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      # 第一步：正常构建 archive（关闭签名）
      - name: Build Archive
        run: |
          xcodebuild archive \
            -project EnterpriseApp.xcodeproj \
            -scheme EnterpriseApp \
            -archivePath build/EnterpriseApp.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      # 第二步：手动制作 IPA（彻底绕过 exportArchive 报错）
      - name: 手动生成 IPA（100%不报错）
        run: |
          mkdir -p ipa/Payload
          cp -R build/EnterpriseApp.xcarchive/Products/Applications/EnterpriseApp.app ipa/Payload/
          cd ipa
          zip -ry EnterpriseApp.ipa Payload
          cd ..

      # 第三步：上传最终 IPA
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: EnterpriseApp
          path: ipa/
