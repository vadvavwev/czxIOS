name: EnterpriseApp
options:
  bundleIdPrefix: com.enterprise
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_PREVIEWS: YES

targets:
  EnterpriseApp:
    type: application
    platform: iOS
    sources:
      - path: EnterpriseApp
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.enterprise.EnterpriseApp
        INFOPLIST_FILE: EnterpriseApp/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        SWIFT_EMIT_LOC_STRINGS: YES
    info:
      path: EnterpriseApp/Info.plist
      properties:
        CFBundleName: "$(PRODUCT_NAME)"
        CFBundleDisplayName: "企业办公助手"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundlePackageType: "$(PRODUCT_TYPE)"
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        UILaunchStoryboardName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UIApplicationSupportsIndirectInputEvents: true
        LSRequiresIPhoneOS: true
        UIStatusBarStyle: UIStatusBarStyleDefault
